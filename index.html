<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Senha Segura</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVJkEZSMUkrQ6usKd7185RxsEdlyaHYDUwAFYxngHc+w+LJOBAGytIarcaJBWdo9zjQowl8edLoQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="password-container">
      <div class="header">
        <h1><i class="fas fa-lock"></i> Gerador de Senha</h1>
        <p class="subtitle">Crie senhas seguras e aleatórias</p>
      </div>

      <div class="password-display">
        <div class="input-wrapper">
          <input
            type="text"
            id="passwordInput"
            class="password-input"
            placeholder="Sua senha aparecerá aqui"
            readonly
          />
          <button class="copy-btn" title="Copiar senha">
            <i class="fas fa-copy"></i>
          </button>
        </div>
        <div class="strength-indicator">
          <span class="strength-label">Força:</span>
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-text" id="strengthText">-</span>
        </div>
      </div>

      <div class="options">
        <div class="option">
          <label for="length">Comprimento: <span id="lengthValue">16</span></label>
          <input
            type="range"
            id="length"
            min="8"
            max="32"
            value="16"
            class="slider"
          />
        </div>

        <div class="checkboxes">
          <label class="checkbox-label">
            <input type="checkbox" id="uppercase" checked />
            <span>Maiúsculas (A-Z)</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="lowercase" checked />
            <span>Minúsculas (a-z)</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="numbers" checked />
            <span>Números (0-9)</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="symbols" checked />
            <span>Símbolos (!@#$)</span>
          </label>
        </div>
      </div>

      <button class="generate-btn">
        <i class="fas fa-refresh-alt"></i> Gerar Senha
      </button>
    </main>

    <div class="notification" id="notification">✓ Senha copiada!</div>
    <script src="index.js"></script>
  </body>
</html>
